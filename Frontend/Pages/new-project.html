<body class="new-project-page">
    <h1> New project page</h1>
    <button id = "go-to-home"  aria-label = "Open tab for home page" >Back to home page</button>
      <nav id = "side-navigation" aria-label="side-navigation">

                <li> <a href="/settings.html">Go to Settings</a></li>

    <main id="mid-container">
         <section id = "audio-trim" >
            <!-- Display uploaded file  -->
             <section class="player-container">
                <label for ="audio-upload" class= "custom-upload-btn">Choose audio File</label>
                <input type="file" id="audio-upload" accept = "audio/*">
                <div id = "file-info" class="file-info">No file selected Yet</div>
                <audio id = "audio-player" controls></audio>
            <section id = "keyboard-navigations">
                <p> Key board navigations to trim audio</p>
                <p> To  preview audio file - press p</p>
                <p> to mark starting point - press m</p>
                <p>To mark end point - press mm</p>
                <p> To stop Audio from playing - press s </p>
            </section>
        </section>
       
        
    </main>
    <script src="../Scripts/landing-newP.js"></script>
